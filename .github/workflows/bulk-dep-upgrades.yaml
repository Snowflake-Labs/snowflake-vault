name: Upgrade dependencies
on:
  workflow_dispatch:
    inputs:
      skip:
        description: 'Dependencies to skip separated by whitespace'
        required: false
        type: string
  schedule:
    # Runs 12:00AM on the first of every month
    - cron: '0 0 1 * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true
      - name: Upgrade dependencies
        run: |
          go get -u ./...
          go mod tidy
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated dependency upgrades"
          title: "Automated dependency upgrades"
          body: "Automated dependency upgrades via monthly workflow."
          branch: auto-dependency-upgrades
          delete-branch: true
